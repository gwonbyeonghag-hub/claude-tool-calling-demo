<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tool Calling 데모 — 날씨·검색 봇</title>
<!--
  iMessage 스타일 정적 데모.
  실제 API를 호출하지 않는다. 아래 SCRIPT 배열에 적힌 대화가
  Tool Calling 흐름(질문 → 도구 호출 → 답변)을 그대로 재생만 한다.
  비용/키/네트워크 없이 브라우저에서 바로 열린다.
-->
<style>
  :root {
    --bubble-blue: #0b93f6;
    --bubble-gray: #e9e9eb;
    --bg: #f2f2f7;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Apple SD Gothic Neo", sans-serif;
    background: #d9dbe2;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 32px 16px;
    gap: 16px;
  }
  h1 { font-size: 16px; color: #444; font-weight: 600; }
  .caption { font-size: 13px; color: #777; text-align: center; max-width: 360px; }

  /* 아이폰 외형 */
  .phone {
    width: 375px;
    height: 720px;
    background: var(--bg);
    border-radius: 44px;
    border: 12px solid #1c1c1e;
    box-shadow: 0 20px 50px rgba(0,0,0,0.3);
    overflow: hidden;
    display: flex;
    flex-direction: column;
    position: relative;
  }
  .notch {
    position: absolute; top: 0; left: 50%; transform: translateX(-50%);
    width: 150px; height: 26px; background: #1c1c1e;
    border-bottom-left-radius: 16px; border-bottom-right-radius: 16px;
    z-index: 5;
  }

  /* 헤더 (연락처) */
  .header {
    padding: 34px 16px 10px;
    text-align: center;
    background: rgba(248,248,248,0.92);
    backdrop-filter: blur(10px);
    border-bottom: 1px solid #d1d1d6;
  }
  .avatar {
    width: 44px; height: 44px; border-radius: 50%;
    background: linear-gradient(135deg, #34c759, #0b93f6);
    color: #fff; font-size: 20px;
    display: flex; align-items: center; justify-content: center;
    margin: 0 auto 4px;
  }
  .contact-name { font-size: 13px; font-weight: 600; color: #111; }
  .contact-sub { font-size: 11px; color: #8e8e93; }

  /* 대화 영역 */
  .messages {
    flex: 1;
    overflow-y: auto;
    padding: 14px 12px 8px;
    display: flex;
    flex-direction: column;
    gap: 3px;
  }
  .row { display: flex; margin-top: 6px; }
  .row.user { justify-content: flex-end; }
  .row.bot  { justify-content: flex-start; }

  .bubble {
    max-width: 75%;
    padding: 9px 13px;
    border-radius: 19px;
    font-size: 15px;
    line-height: 1.35;
    word-break: break-word;
    animation: pop 0.18s ease-out;
  }
  .user .bubble { background: var(--bubble-blue); color: #fff; border-bottom-right-radius: 5px; }
  .bot .bubble  { background: var(--bubble-gray); color: #000; border-bottom-left-radius: 5px; }

  @keyframes pop { from { transform: scale(0.85); opacity: 0; } to { transform: scale(1); opacity: 1; } }

  /* 도구 호출 표시 (가운데 시스템 칩) */
  .tool {
    align-self: center;
    margin: 8px 0 2px;
    background: #fff;
    border: 1px solid #e2e2e6;
    color: #3a3a3c;
    font-size: 11.5px;
    font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
    padding: 6px 11px;
    border-radius: 12px;
    box-shadow: 0 1px 2px rgba(0,0,0,0.05);
    animation: pop 0.18s ease-out;
  }
  .tool .dot { color: #34c759; }
  .tool .label { color: #8e8e93; }

  /* 타이핑 인디케이터 */
  .typing { display: flex; gap: 4px; padding: 12px 14px; }
  .typing span {
    width: 8px; height: 8px; border-radius: 50%; background: #b6b6bb;
    animation: blink 1.3s infinite ease-in-out;
  }
  .typing span:nth-child(2) { animation-delay: 0.2s; }
  .typing span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes blink { 0%, 60%, 100% { opacity: 0.3; } 30% { opacity: 1; } }

  /* 입력창 (장식) */
  .composer {
    padding: 8px 12px 14px;
    background: rgba(248,248,248,0.92);
    border-top: 1px solid #d1d1d6;
    display: flex; gap: 8px; align-items: center;
  }
  .composer .field {
    flex: 1; height: 34px; border-radius: 17px; border: 1px solid #c7c7cc;
    background: #fff; color: #aaa; font-size: 14px;
    display: flex; align-items: center; padding: 0 14px;
  }
  .replay {
    border: none; background: var(--bubble-blue); color: #fff;
    border-radius: 17px; height: 34px; padding: 0 16px; font-size: 13px;
    cursor: pointer; font-weight: 600;
  }
  .replay:active { transform: scale(0.96); }
</style>
</head>
<body>
  <h1>📱 Tool Calling 데모 (iMessage 스타일)</h1>
  <p class="caption">실제 봇의 흐름을 그대로 재생하는 화면입니다. 가운데 회색 칩이 모델이
    <code>get_weather</code>·<code>web_search</code> 도구를 호출하는 순간을 보여줍니다.
    (이 화면은 시각용 목업이며 API를 호출하지 않습니다.)</p>

  <div class="phone">
    <div class="notch"></div>
    <div class="header">
      <div class="avatar">🤖</div>
      <div class="contact-name">날씨·검색 봇</div>
      <div class="contact-sub">Claude · Tool Calling</div>
    </div>
    <div class="messages" id="messages"></div>
    <div class="composer">
      <div class="field">iMessage</div>
      <button class="replay" id="replay">다시 재생</button>
    </div>
  </div>

<script>
  // 재생할 대화. 실제 main.py / tools.py 의 동작과 같은 순서다.
  //   user : 사용자 말풍선
  //   tool : 모델이 도구를 호출하는 순간 (가운데 칩)
  //   bot  : 봇 답변 (타이핑 후 표시)
  const SCRIPT = [
    { type: "user", text: "서울 날씨 어때?" },
    { type: "tool", name: "get_weather", args: '{ location: "서울" }' },
    { type: "bot",  text: "지금 서울은 맑고 24도예요. 체감 25도라 나들이하기 좋겠네요." },

    { type: "user", text: "오늘 제주는?" },
    { type: "tool", name: "get_weather", args: '{ location: "제주" }' },
    { type: "bot",  text: "제주는 비가 내리고 있어요. 21도에 습도가 높으니 우산 챙기세요." },

    { type: "user", text: "트랜스포머 모델이 뭔지 검색해줘" },
    { type: "tool", name: "web_search", args: '{ query: "트랜스포머 모델" }' },
    { type: "bot",  text: "찾아보니 트랜스포머는 문장 속 단어들의 관계를 한꺼번에 보는 방식의 신경망이에요. 요즘 거의 모든 언어 모델의 바탕이 되는 구조예요." },
  ];

  const box = document.getElementById("messages");
  let timers = [];

  function scrollDown() { box.scrollTop = box.scrollHeight; }

  function addUser(text) {
    box.insertAdjacentHTML("beforeend",
      `<div class="row user"><div class="bubble">${text}</div></div>`);
    scrollDown();
  }

  function addTool(name, args) {
    box.insertAdjacentHTML("beforeend",
      `<div class="tool"><span class="dot">●</span> <b>${name}</b>${args}
       <span class="label"> 호출 중…</span></div>`);
    scrollDown();
  }

  function addTyping() {
    const el = document.createElement("div");
    el.className = "row bot";
    el.innerHTML = `<div class="bubble typing"><span></span><span></span><span></span></div>`;
    box.appendChild(el);
    scrollDown();
    return el;
  }

  function addBot(text) {
    box.insertAdjacentHTML("beforeend",
      `<div class="row bot"><div class="bubble">${text}</div></div>`);
    scrollDown();
  }

  // 스텝을 시간차를 두고 재생한다.
  function play() {
    timers.forEach(clearTimeout);
    timers = [];
    box.innerHTML = "";
    let t = 400;

    SCRIPT.forEach((step) => {
      if (step.type === "user") {
        timers.push(setTimeout(() => addUser(step.text), t));
        t += 900;
      } else if (step.type === "tool") {
        timers.push(setTimeout(() => addTool(step.name, step.args), t));
        t += 1100;
      } else if (step.type === "bot") {
        const typingEl = {};
        timers.push(setTimeout(() => { typingEl.node = addTyping(); }, t));
        t += 1200;
        timers.push(setTimeout(() => {
          if (typingEl.node) typingEl.node.remove();
          addBot(step.text);
        }, t));
        t += 1300;
      }
    });
  }

  document.getElementById("replay").addEventListener("click", play);
  play();
</script>
</body>
</html>
